name: Release Creation

on: 
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      test_tag:
        description: "Test tag"
        required: true
        default: "v0.0.0-test"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    # Get part of the tag after the `v`
    - name: Extract tag version number
      shell: bash
      run: |
        tag="${{ github.event_name == 'workflow_dispatch' && inputs.test_tag || github.event.release.tag_name }}"
        version="${tag#v}"
        echo "version=$version" >> "$GITHUB_ENV"
        echo "url=https://github.com/${{ github.repository }}" >> "$GITHUB_ENV"
        echo "manifest=https://github.com/${{ github.repository }}/releases/latest/download/module.json" >> "$GITHUB_ENV"
        echo "download=https://github.com/${{ github.repository }}/releases/download/${tag}/module.zip" >> "$GITHUB_ENV"

    # Substitute the Manifest and Download URLs in the module.json
    - name: Substitute Manifest and Download Links For Versioned Ones
      shell: bash
      run: |
        node -e "const fs=require('fs');const p='module.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.version;j.url=process.env.url;j.manifest=process.env.manifest;j.download=process.env.download;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

    # Create a zip file with all files required by the module to add to the release
    - name: Create ZIP
      run: |
        files=(src module.json index.js LICENSE.md)
        if [ -d packs ]; then
          files+=(packs)
        fi
        zip -r ./module.zip "${files[@]}"
    
    - name: Validate Release artifacts
      shell: bash
      run: |
        test -s module.json
        test -s module.zip

    # Create a release for this specific version
    - name: Update Release with Files
      if: github.event_name == 'release'
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        name: ${{ github.event.release.name }}
        draft: ${{ github.event.release.unpublished }}
        prerelease: ${{ github.event.release.prerelease }}
        token: ${{ secrets.ACTION_PAT }}
        artifacts: './module.json, ./module.zip'
        tag: ${{ github.event.release.tag_name }}
        body: ${{ github.event.release.body }}

    # Publish to Foundry VTT
    - name: Publish Module to FoundryVTT Website
      if: github.event_name == 'release'
      id: publish-to-foundry-website
      continue-on-error: true
      uses: cs96and/FoundryVTT-release-package@v1
      with:
        package-token: ${{ secrets.FOUNDRY_API_TOKEN }}
        manifest-url: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.json
